<!DOCTYPE html>
<html>
<head>
    <title>Itinerari proposti Monte Maddalena</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; } /* Mappa a tutto schermo */
        .info-box {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 10px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="info-box">
    <h3 style="margin:0">Parco delle Colline</h3>
    <p style="margin:5px 0 0">Sentiero Monte Maddalena</p>
</div>

<div id="map"></div>

<script>
    // 1. Inizializza la mappa su Brescia
    var map = L.map('map').setView([45.54, 10.23], 13);

    // 2. Aggiungi lo sfondo (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 3. CARICA IL TUO FILE GPX (QUI DEVI INCOLLARE IL TUO LINK!)
    var gpxUrl = 'https://raw.githubusercontent.com/danbisceglia/maddalenatest/6369231942a0807b036a165f9a01441c3aeee4dc/IterarioAnew'; 

    new L.GPX(gpxUrl, {
        async: true,
        marker_options:{
            startIconUrl: null,
            endIconUrl: null,
            shadowUrl: null,
            wptIconUrls: {}},
polyline_options: {
            color: '#c0392b', // Un rosso scuro, più elegante
            weight: 6,        // Linea più spessa per il mobile
            opacity: 0.9,
            lineJoin: 'round' // Arrotonda gli angoli della traccia
        }
  }).on('loaded', function(e) {
        map.fitBounds(e.target.getBounds()); // Centra la mappa sulla traccia
    }).addTo(map);
    
console.log("Distanza: " + (e.target.get_distance() / 1000).toFixed(2) + " km");
    }).addTo(map);
    // 4. Funzione GPS per l'utente
    map.locate({setView: false, watch: true});
    map.on('locationfound', function(e) {
        L.circle(e.latlng, e.accuracy / 2).addTo(map);
        L.marker(e.latlng).addTo(map).bindPopup("Sei qui").openPopup();
    });
</script>

</body>

</html>
