<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mappa Sentiero 1 - Parco delle Colline</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="Percorso1_GottardoRoccodiVeloRifugioMompiano_unito_2.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .header {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 10px; border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div class="header"><b>Sentiero 1: Gottardo - Rif. Mompiano</b></div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([45.55, 10.26], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // USARE LA VARIABILE CONTENUTA NEL TUO FILE .JS
        // Il nome della variabile deve essere identico a quello nel file
        var tracciaData = json_Percorso1_GottardoRoccodiVeloRifugioMompiano_unito_2;

        var stratoGeoJSON = L.geoJSON(tracciaData, {
            style: function (feature) {
                return {
                    color: '#c0392b', // Rosso Brescia
                    weight: 5,
                    opacity: 0.8,
                    fillOpacity: 0 // QUESTO TOGLIE LA LINEA DI CHIUSURA
                };
            }
        }).addTo(map);

        // Centra automaticamente la mappa sulla traccia
        map.fitBounds(stratoGeoJSON.getBounds());
    </script>
</body>
</html>
